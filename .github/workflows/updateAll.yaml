name: Update Packages from History

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 0 * * *'  # 每天UTC时间0点自动运行

jobs:
  update-packages:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq

    - name: Update packages from pull history
      run: |
        # 检查pull_history.json文件是否存在
        if [ ! -f "pull_history.json" ]; then
          echo "❌ pull_history.json not found"
          exit 1
        fi

        echo "📖 Reading pull history..."
        updated=false

        # 使用jq解析JSON并循环处理每个包
        jq -c '.[]' pull_history.json | while IFS= read -r package; do
          # 解析JSON字段
          target_path=$(echo "$package" | jq -r '.target_path')
          local_path=$(echo "$package" | jq -r '.local_path')
          status=$(echo "$package" | jq -r '.status')
          
          echo "📦 Processing: $local_path (from: $target_path)"
          
          # 检查本地路径是否存在
          if [ -d "$local_path" ] || [ -f "$local_path" ]; then
            echo "✅ Local path exists: $local_path"
            
            # 从target_path提取仓库信息
            repo_owner=$(echo "$target_path" | cut -d'/' -f1)
            repo_name=$(echo "$target_path" | cut -d'/' -f2)
            sub_path=$(echo "$target_path" | cut -d'/' -f3-)
            
            # 构建完整的GitHub仓库URL
            repo_url="https://github.com/$repo_owner/$repo_name.git"
            
            echo "🔗 Source repository: $repo_url"
            echo "📁 Source path: '$sub_path'"
            
            # 创建临时目录用于克隆源仓库
            temp_dir=$(mktemp -d)
            
            # 克隆源仓库（浅克隆以提高效率）
            echo "⬇️ Cloning source repository..."
            if git clone --depth 1 "$repo_url" "$temp_dir" 2>/dev/null; then
              cd "$temp_dir"
              
              # 如果sub_path为空，表示要克隆整个仓库
              if [ -z "$sub_path" ]; then
                echo "ℹ️ No sub-path specified, using entire repository"
                source_content="."
              else
                # 检查源路径是否存在
                if [ -d "$sub_path" ] || [ -f "$sub_path" ]; then
                  echo "✅ Source path exists in remote repository"
                  source_content="$sub_path"
                else
                  echo "❌ Source path not found in remote repository: $sub_path"
                  cd - > /dev/null
                  rm -rf "$temp_dir"
                  continue
                fi
              fi
              
              # 回到工作目录
              cd - > /dev/null
              
              # 删除本地旧文件
              echo "🗑️ Removing old local files..."
              rm -rf "$local_path"
              
              # 创建目标目录
              mkdir -p "$(dirname "$local_path")"
              
              # 复制新文件
              echo "🔄 Copying updated files from $source_content..."
              if cp -r "$temp_dir/$source_content" "$local_path"; then
                echo "✅ Successfully updated: $local_path"
                updated=true
              else
                echo "❌ Failed to copy files to: $local_path"
              fi
              
              # 清理临时目录
              rm -rf "$temp_dir"
            else
              echo "❌ Failed to clone repository: $repo_url"
              rm -rf "$temp_dir"
            fi
            
          else
            echo "⚠️ Local path does not exist, skipping: $local_path"
          fi
          
          echo "---"
        done

        # 检测并提交更改
        if git diff --quiet; then
          echo "📝 No updates were made"
        else
          echo "🚀 Changes detected, committing updates..."
          git add .
          git commit -m "chore: update packages from pull history

          - Auto-update based on pull_history.json
          - Updated at: $(date -Iseconds)"
          git push
          echo "✅ Updates pushed to repository"
        fi

    - name: Update pull history timestamp
      if: always()
      run: |
        # 更新pull_history.json中的时间戳
        if [ -f "pull_history.json" ]; then
          current_time=$(date -Iseconds)
          jq --arg time "$current_time" '
            map(
              if .status == "success" then
                .pulled_at = $time
              else
                .
              end
            )
          ' pull_history.json > pull_history_updated.json
          
          # 检查是否有实际更改
          if ! cmp -s pull_history.json pull_history_updated.json; then
            mv pull_history_updated.json pull_history.json
            git add pull_history.json
            git commit -m "chore: update pull history timestamps [skip ci]" || echo "No changes to pull history"
            git push || echo "No changes to push"
          else
            rm pull_history_updated.json
            echo "📝 No timestamp updates needed"
          fi
        fi
