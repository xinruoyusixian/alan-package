name: Update Packages from History

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 0 * * *'  # 每天UTC时间0点自动运行

jobs:
  update-packages:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

    - name: Read pull history and update packages
      run: |
        # 检查pull_history.json文件是否存在
        if [ ! -f "pull_history.json" ]; then
          echo "❌ pull_history.json not found"
          exit 1
        fi

        # 安装jq用于JSON解析
        sudo apt-get update && sudo apt-get install -y jq

        # 读取pull_history.json并处理每个包
        packages=$(jq -c '.[]' pull_history.json)
        updated=false

        while IFS= read -r package; do
          # 解析JSON字段
          target_path=$(echo "$package" | jq -r '.target_path')
          local_path=$(echo "$package" | jq -r '.local_path')
          status=$(echo "$package" | jq -r '.status')
          
          echo "📦 Processing: $local_path (from: $target_path)"
          
          # 检查本地路径是否存在
          if [ -d "$local_path" ] || [ -f "$local_path" ]; then
            echo "✅ Local path exists: $local_path"
            
            # 从target_path提取仓库信息
            repo_owner=$(echo "$target_path" | cut -d'/' -f1)
            repo_name=$(echo "$target_path" | cut -d'/' -f2)
            sub_path=$(echo "$target_path" | cut -d'/' -f3-)
            
            # 构建完整的GitHub仓库URL
            repo_url="https://github.com/$repo_owner/$repo_name.git"
            
            echo "🔗 Source repository: $repo_url"
            echo "📁 Source path: $sub_path"
            
            # 创建临时目录用于克隆源仓库
            temp_dir=$(mktemp -d)
            
            # 克隆源仓库（只克隆最近的一次提交以减少数据量）
            echo "⬇️ Cloning source repository..."
            git clone --depth 1 --filter=blob:none --sparse "$repo_url" "$temp_dir"
            
            # 进入临时目录并设置稀疏检出
            cd "$temp_dir"
            git sparse-checkout init --cone
            git sparse-checkout set "$sub_path"
            
            # 检查源路径是否存在
            if [ -d "$sub_path" ] || [ -f "$sub_path" ]; then
              echo "✅ Source path exists in remote repository"
              
              # 复制文件到本地路径
              echo "🔄 Updating local package..."
              rm -rf "../../$local_path"
              cp -r "$sub_path" "../../$local_path"
              
              # 设置更新标志
              updated=true
              echo "✅ Successfully updated: $local_path"
            else
              echo "❌ Source path not found in remote repository: $sub_path"
            fi
            
            # 清理临时目录
            cd ../..
            rm -rf "$temp_dir"
            
          else
            echo "⚠️ Local path does not exist, skipping: $local_path"
          fi
          
          echo "---"
          
        done <<< "$packages"

        # 如果有更新，提交更改
        if [ "$updated" = true ]; then
          echo "🚀 Committing updates..."
          git add .
          git commit -m "chore: update packages from pull history [skip ci]"
          git push
          echo "✅ Updates pushed to repository"
        else
          echo "📝 No updates were made"
        fi

    - name: Update pull history timestamp
      if: always()
      run: |
        # 更新pull_history.json中的时间戳（仅对成功处理的包）
        if [ -f "pull_history.json" ]; then
          current_time=$(date -Iseconds)
          jq --arg time "$current_time" '
            map(
              if .status == "success" then
                .pulled_at = $time
              else
                .
              end
            )
          ' pull_history.json > pull_history_updated.json
          
          mv pull_history_updated.json pull_history.json
          
          git add pull_history.json
          git commit -m "chore: update pull history timestamps [skip ci]" || echo "No changes to pull history"
          git push || echo "No changes to push"
        fi
