name: 更新现有代码

on:
  workflow_dispatch:
    inputs:
      force_refresh:
        description: '强制刷新（即使目录存在也重新下载）'
        required: false
        type: boolean
        default: false

jobs:
  update-existing-directories:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout current repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl git
        
    - name: Configure Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
    - name: Pull latest changes
      run: |
        git pull origin main
        
    - name: Update existing directories
      run: |
        FORCE_REFRESH="${{ github.event.inputs.force_refresh }}"
        JSON_FILE="pull_history.json"
        
        if [ ! -f "$JSON_FILE" ]; then
          echo "❌ $JSON_FILE 不存在，没有历史记录可更新"
          exit 0
        fi
        
        # 检查JSON文件格式
        if ! jq . "$JSON_FILE" > /dev/null 2>&1; then
          echo "❌ $JSON_FILE 格式错误"
          exit 1
        fi
        
        # 读取所有记录
        RECORD_COUNT=$(jq 'length' "$JSON_FILE")
        echo "找到 $RECORD_COUNT 条历史记录"
        
        # 统计变量
        SUCCESS_COUNT=0
        FAILED_COUNT=0
        NOT_EXIST_COUNT=0
        
        # 创建临时目录用于处理
        TEMP_DIR=$(mktemp -d)
        
        # 处理每条记录
        for i in $(seq 0 $((RECORD_COUNT - 1))); do
          echo "==========================================="
          echo "处理项目 $((i + 1))/$RECORD_COUNT"
          
          # 提取记录信息
          TARGET_PATH=$(jq -r ".[$i].target_path" "$JSON_FILE")
          LOCAL_PATH=$(jq -r ".[$i].local_path" "$JSON_FILE")
          
          echo "目标路径: $TARGET_PATH"
          echo "本地路径: $LOCAL_PATH"
          
          # 检查目录是否存在
          if [ ! -d "$LOCAL_PATH" ]; then
            echo "❌ 目录不存在，跳过: $LOCAL_PATH"
            ((NOT_EXIST_COUNT++))
            continue
          fi
          
          # 解析目标路径
          REPO_OWNER=$(echo "$TARGET_PATH" | cut -d'/' -f1)
          REPO_NAME=$(echo "$TARGET_PATH" | cut -d'/' -f2)
          SUB_PATH=$(echo "$TARGET_PATH" | cut -d'/' -f3-)
          
          echo "仓库: $REPO_OWNER/$REPO_NAME"
          echo "子路径: $SUB_PATH"
          
          # 强制刷新：删除目录
          if [ "$FORCE_REFRESH" = "true" ]; then
            echo "强制刷新目录: $LOCAL_PATH"
            rm -rf "$LOCAL_PATH"
            mkdir -p "$LOCAL_PATH"
          fi
          
          # 方法1: 使用git sparse checkout
          echo "尝试使用git sparse checkout下载..."
          TEMP_REPO_DIR="$TEMP_DIR/repo_$i"
          mkdir -p "$TEMP_REPO_DIR"
          
          cd "$TEMP_REPO_DIR"
          git init
          git remote add origin "https://github.com/$REPO_OWNER/$REPO_NAME.git"
          git config core.sparseCheckout true
          
          # 设置sparse checkout路径
          if [ -n "$SUB_PATH" ]; then
            echo "$SUB_PATH/*" > .git/info/sparse-checkout
          else
            echo "/*" > .git/info/sparse-checkout
          fi
          
          # 尝试不同的分支
          BRANCHES=("main" "master" "HEAD")
          GIT_SUCCESS=false
          for branch in "${BRANCHES[@]}"; do
            if git pull origin "$branch" --depth=1 --quiet 2>/dev/null; then
              echo "✅ 从 $branch 分支拉取成功"
              GIT_SUCCESS=true
              break
            fi
          done
          
          cd - > /dev/null
          
          if [ "$GIT_SUCCESS" = true ]; then
            # 移动文件到目标位置
            if [ -n "$SUB_PATH" ] && [ -d "$TEMP_REPO_DIR/$SUB_PATH" ]; then
              # 删除目标目录内容
              rm -rf "$LOCAL_PATH"/*
              # 移动新内容
              cp -r "$TEMP_REPO_DIR/$SUB_PATH"/* "$LOCAL_PATH"/ 2>/dev/null || true
              echo "✅ 成功更新目录: $LOCAL_PATH"
              ((SUCCESS_COUNT++))
            elif [ -d "$TEMP_REPO_DIR" ]; then
              # 删除目标目录内容
              rm -rf "$LOCAL_PATH"/*
              # 移动新内容
              cp -r "$TEMP_REPO_DIR"/* "$LOCAL_PATH"/ 2>/dev/null || true
              echo "✅ 成功更新目录: $LOCAL_PATH"
              ((SUCCESS_COUNT++))
            else
              echo "❌ 无法找到下载的内容"
              ((FAILED_COUNT++))
            fi
          else
            echo "❌ git下载失败"
            ((FAILED_COUNT++))
          fi
          
          # 清理临时仓库
          rm -rf "$TEMP_REPO_DIR"
        done
        
        # 清理临时目录
        rm -rf "$TEMP_DIR"
        
        # 更新JSON文件的时间戳
        if [ $SUCCESS_COUNT -gt 0 ] || [ $FAILED_COUNT -gt 0 ]; then
          CURRENT_DATE=$(date -Iseconds)
          # 创建临时文件
          TMP_JSON=$(mktemp)
          # 更新所有记录的状态和时间
          jq --arg date "$CURRENT_DATE" \
             'map(.pulled_at = $date | .status = if (.local_path | (test("^[a-zA-Z0-9_-]+$") and (.[0:1] != "."))) then (if (.["local_path"] | (.[0:1] != ".") and (.[0:1] != "/")) then "updated" else "unknown" end) else "unknown" end)' \
             "$JSON_FILE" > "$TMP_JSON" && mv "$TMP_JSON" "$JSON_FILE"
        fi
        
        echo "==========================================="
        echo "✅ 更新完成"
        
        # 显示摘要
        echo "更新摘要:"
        echo "  ✅ 成功: $SUCCESS_COUNT"
        echo "  ❌ 失败: $FAILED_COUNT"
        echo "  📁 不存在(跳过): $NOT_EXIST_COUNT"
        
        # 如果有失败的项目，非零退出
        if [ "$FAILED_COUNT" -gt 0 ]; then
          echo "警告: $FAILED_COUNT 个项目更新失败"
          exit 1
        fi
        
    - name: Commit and push changes
      run: |
        git pull origin main --no-rebase
        git add .
        
        if git diff --staged --quiet; then
          echo "没有更改需要提交"
        else
          git commit -m "Auto-update: 更新现有项目 [$(date +%Y-%m-%d)]"
          git push origin main
          echo "更改已提交并推送"
        fi
