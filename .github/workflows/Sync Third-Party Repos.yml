name: Pull Directory with SVN

on:
  workflow_dispatch:
    inputs:
      target_directory:
        description: '目标目录路径 (如: linkease/nas-packages-luci/luci/luci-app-ddnsto)'
        required: true
        default: 'linkease/nas-packages-luci/luci/luci-app-ddnsto'

jobs:
  pull-directory:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout current repository
      uses: actions/checkout@v4
      
    - name: Pull directory using SVN
      run: |
        TARGET_DIR="${{ github.event.inputs.target_directory }}"
        DIR_NAME=$(echo "$TARGET_DIR" | awk -F'/' '{print $NF}')
        REPO_URL="https://github.com/$(echo "$TARGET_DIR" | cut -d'/' -f1-2)/trunk/$(echo "$TARGET_DIR" | cut -d'/' -f3-)"
        
        echo "Pulling directory: $TARGET_DIR"
        echo "Directory name: $DIR_NAME"
        echo "SVN URL: $REPO_URL"
        
        # 使用svn导出目录
        svn export --force "$REPO_URL" "$DIR_NAME"
        
    - name: Update JSON history
      run: |
        TARGET_DIR="${{ github.event.inputs.target_directory }}"
        DIR_NAME=$(echo "$TARGET_DIR" | awk -F'/' '{print $NF}')
        JSON_FILE="pull_history.json"
        
        # 读取或创建JSON文件
        if [ -f "$JSON_FILE" ]; then
          cat "$JSON_FILE" | jq . > /dev/null 2>&1 || echo "[]" > "$JSON_FILE"
        else
          echo "[]" > "$JSON_FILE"
        fi
        
        # 检查是否已存在
        EXISTS=$(jq --arg target "$TARGET_DIR" 'any(.[]; .target_path == $target)' "$JSON_FILE")
        
        if [ "$EXISTS" = "false" ]; then
          # 添加新记录
          jq --arg target "$TARGET_DIR" \
             --arg local "$DIR_NAME" \
             --arg date "$(date -Iseconds)" \
             '. += [{"target_path": $target, "local_path": $local, "pulled_at": $date, "status": "success"}]' \
             "$JSON_FILE" > tmp.json && mv tmp.json "$JSON_FILE"
          echo "Added new record for $TARGET_DIR"
        else
          echo "Record for $TARGET_DIR already exists"
        fi
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --staged --quiet || git commit -m "Auto-pull directory: ${{ github.event.inputs.target_directory }}"
        git push
