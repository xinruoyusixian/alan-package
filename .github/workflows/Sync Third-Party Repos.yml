name: Pull Directory and Update JSON

on:
  workflow_dispatch:
    inputs:
      target_directory:
        description: '目标目录路径 (如: linkease/nas-packages-luci/luci/luci-app-ddnsto)'
        required: true
        default: 'linkease/nas-packages-luci/luci/luci-app-ddnsto'

jobs:
  pull-directory:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout current repository
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y subversion jq
        
    - name: Pull directory using Git
      run: |
        TARGET_DIR="${{ github.event.inputs.target_directory }}"
        DIR_NAME=$(echo "$TARGET_DIR" | awk -F'/' '{print $NF}')
        REPO_OWNER=$(echo "$TARGET_DIR" | cut -d'/' -f1)
        REPO_NAME=$(echo "$TARGET_DIR" | cut -d'/' -f2)
        SUB_PATH=$(echo "$TARGET_DIR" | cut -d'/' -f3-)
        
        echo "Target directory: $TARGET_DIR"
        echo "Directory name: $DIR_NAME"
        echo "Repo: $REPO_OWNER/$REPO_NAME"
        echo "Sub path: $SUB_PATH"
        
        # 创建临时目录
        TEMP_DIR="temp_repo_$$"
        mkdir "$TEMP_DIR"
        
        # 克隆仓库（浅克隆，只拉取最新commit）
        echo "Cloning repository..."
        git clone --depth 1 --filter=blob:none --sparse "https://github.com/$REPO_OWNER/$REPO_NAME.git" "$TEMP_DIR"
        
        cd "$TEMP_DIR"
        
        # 设置sparse-checkout只拉取目标目录
        git sparse-checkout set "$SUB_PATH"
        
        # 检查目录是否存在
        if [ -d "$SUB_PATH" ]; then
          echo "Directory found, copying files..."
          # 复制到目标位置
          cd ..
          if [ -d "$DIR_NAME" ]; then
            rm -rf "$DIR_NAME"
          fi
          cp -r "$TEMP_DIR/$SUB_PATH" "$DIR_NAME"
          echo "✅ Successfully pulled directory: $DIR_NAME"
        else
          echo "❌ Directory not found: $SUB_PATH"
          # 尝试使用SVN作为备选方案
          cd ..
          echo "Trying SVN as fallback..."
          SVN_URL="https://github.com/$REPO_OWNER/$REPO_NAME/trunk/$SUB_PATH"
          if svn export "$SVN_URL" "$DIR_NAME" --force 2>/dev/null; then
            echo "✅ Successfully pulled directory via SVN: $DIR_NAME"
          else
            # 尝试branches/master
            SVN_URL="https://github.com/$REPO_OWNER/$REPO_NAME/branches/master/$SUB_PATH"
            if svn export "$SVN_URL" "$DIR_NAME" --force 2>/dev/null; then
              echo "✅ Successfully pulled directory via SVN master: $DIR_NAME"
            else
              echo "❌ All methods failed to pull directory"
              exit 1
            fi
          fi
        fi
        
        # 清理临时目录
        rm -rf "$TEMP_DIR"
        
    - name: Update JSON history
      run: |
        TARGET_DIR="${{ github.event.inputs.target_directory }}"
        DIR_NAME=$(echo "$TARGET_DIR" | awk -F'/' '{print $NF}')
        JSON_FILE="pull_history.json"
        
        # 创建JSON文件如果不存在
        if [ ! -f "$JSON_FILE" ]; then
          echo "[]" > "$JSON_FILE"
        fi
        
        # 验证JSON文件格式
        if ! jq . "$JSON_FILE" > /dev/null 2>&1; then
          echo "JSON file is invalid, recreating..."
          echo "[]" > "$JSON_FILE"
        fi
        
        # 检查是否已存在相同记录
        EXISTS=$(jq --arg target "$TARGET_DIR" 'any(.[]; .target_path == $target)' "$JSON_FILE")
        
        if [ "$EXISTS" = "false" ]; then
          # 添加新记录
          jq --arg target "$TARGET_DIR" \
             --arg local "$DIR_NAME" \
             --arg date "$(date -Iseconds)" \
             '. += [{"target_path": $target, "local_path": $local, "pulled_at": $date, "status": "success"}]' \
             "$JSON_FILE" > tmp.json && mv tmp.json "$JSON_FILE"
          echo "✅ Added new record for: $TARGET_DIR"
        else
          echo "ℹ️ Record already exists for: $TARGET_DIR"
        fi
        
        # 显示当前记录数量
        COUNT=$(jq 'length' "$JSON_FILE")
        echo "Total records in JSON: $COUNT"
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-pull: ${{ github.event.inputs.target_directory }} [$(date +%Y-%m-%d)]"
          git push
          echo "Changes committed and pushed"
        fi
