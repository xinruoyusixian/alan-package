name: 偷走你的代码2

on:
  workflow_dispatch:
    inputs:
      target_directory:
        description: '目标目录路径 (如: owner/repo 或 owner/repo/sub 或 owner/repo/sub1/sub2)'
        required: true
        default: 'linkease/nas-packages-luci/luci/luci-app-ddnsto'

jobs:
  pull-directory:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout current repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl git
        
    - name: Configure Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
    - name: Pull latest changes
      run: |
        git pull origin main
        
    - name: Pull directory with flexible path handling
      run: |
        TARGET_DIR="${{ github.event.inputs.target_directory }}"
        
        echo "目标目录: $TARGET_DIR"
        
        # 智能解析路径组件
        IFS='/' read -ra PARTS <<< "$TARGET_DIR"
        
        if [ ${#PARTS[@]} -lt 2 ]; then
          echo "❌ 路径格式错误，需要至少两级路径：owner/repo"
          exit 1
        fi
        
        REPO_OWNER="${PARTS[0]}"
        REPO_NAME="${PARTS[1]}"
        
        # 动态确定子路径和本地目录名
        if [ ${#PARTS[@]} -eq 2 ]; then
          # 只有 owner/repo - 拉取整个仓库
          SUB_PATH=""
          DIR_NAME="$REPO_NAME"
          echo "模式: 拉取整个仓库"
        elif [ ${#PARTS[@]} -eq 3 ]; then
          # owner/repo/sub - 拉取一级子目录
          SUB_PATH="${PARTS[2]}"
          DIR_NAME="${PARTS[2]}"
          echo "模式: 拉取一级子目录"
        else
          # owner/repo/sub1/sub2/... - 拉取多级子目录
          SUB_PATH=""
          for ((i=2; i<${#PARTS[@]}; i++)); do
            if [ -z "$SUB_PATH" ]; then
              SUB_PATH="${PARTS[i]}"
            else
              SUB_PATH="$SUB_PATH/${PARTS[i]}"
            fi
          done
          # 本地目录名使用最后一级
          DIR_NAME="${PARTS[-1]}"
          echo "模式: 拉取多级子目录"
        fi
        
        echo "仓库所有者: $REPO_OWNER"
        echo "仓库名称: $REPO_NAME"
        echo "子路径: '$SUB_PATH'"
        echo "本地目录名: $DIR_NAME"
        
        # 删除已存在的目录
        if [ -d "$DIR_NAME" ]; then
          echo "删除现有目录: $DIR_NAME"
          rm -rf "$DIR_NAME"
        fi
        
        # 创建临时目录
        TEMP_DIR=$(mktemp -d)
        
        # 使用git clone下载
        echo "尝试使用git clone下载..."
        GIT_URL="https://github.com/$REPO_OWNER/$REPO_NAME.git"
        
        if git clone --filter=blob:none --no-checkout --depth 1 --quiet "$GIT_URL" "$TEMP_DIR" 2>/dev/null; then
          cd "$TEMP_DIR"
          
          # 配置sparse checkout
          git sparse-checkout init --cone
          if [ -n "$SUB_PATH" ]; then
            echo "设置sparse checkout路径: $SUB_PATH"
            git sparse-checkout set "$SUB_PATH"
          else
            echo "拉取整个仓库"
            git sparse-checkout set "/*"
          fi
          
          # 检出文件
          if git checkout --quiet; then
            echo "✅ Git下载成功"
            
            # 创建目标目录
            mkdir -p "../$DIR_NAME"
            
            # 根据路径类型复制文件
            if [ -n "$SUB_PATH" ] && [ -d "$TEMP_DIR/$SUB_PATH" ]; then
              # 有子路径的情况
              echo "复制子目录内容: $SUB_PATH -> $DIR_NAME"
              cp -r "$TEMP_DIR/$SUB_PATH"/* "../$DIR_NAME"/ 2>/dev/null || true
              echo "✅ 成功下载子目录: $DIR_NAME"
            elif [ -d "$TEMP_DIR" ]; then
              # 整个仓库的情况
              echo "复制整个仓库内容 -> $DIR_NAME"
              # 排除.git目录
              find "$TEMP_DIR" -maxdepth 1 -name ".git" -prune -o -type f -print -o -type d -print | \
                while read item; do
                  if [ "$item" != "$TEMP_DIR/.git" ]; then
                    cp -r "$item" "../$DIR_NAME"/ 2>/dev/null || true
                  fi
                done
              echo "✅ 成功下载整个仓库: $DIR_NAME"
            else
              echo "❌ 无法找到下载的内容"
              exit 1
            fi
          else
            echo "❌ Git检出失败"
            exit 1
          fi
          
          cd - > /dev/null
        else
          echo "❌ Git克隆失败"
          exit 1
        fi
        
        # 清理临时目录
        rm -rf "$TEMP_DIR"
        
    - name: Update JSON history with flexible path info
      run: |
        TARGET_DIR="${{ github.event.inputs.target_directory }}"
        
        # 智能解析路径组件（与上面相同的逻辑）
        IFS='/' read -ra PARTS <<< "$TARGET_DIR"
        REPO_OWNER="${PARTS[0]}"
        REPO_NAME="${PARTS[1]}"
        
        if [ ${#PARTS[@]} -eq 2 ]; then
          SUB_PATH=""
          DIR_NAME="$REPO_NAME"
        elif [ ${#PARTS[@]} -eq 3 ]; then
          SUB_PATH="${PARTS[2]}"
          DIR_NAME="${PARTS[2]}"
        else
          SUB_PATH=""
          for ((i=2; i<${#PARTS[@]}; i++)); do
            if [ -z "$SUB_PATH" ]; then
              SUB_PATH="${PARTS[i]}"
            else
              SUB_PATH="$SUB_PATH/${PARTS[i]}"
            fi
          done
          DIR_NAME="${PARTS[-1]}"
        fi
        
        JSON_FILE="pull_history.json"
        
        if [ ! -f "$JSON_FILE" ]; then
          echo "[]" > "$JSON_FILE"
        fi
        
        if ! jq . "$JSON_FILE" > /dev/null 2>&1; then
          echo "[]" > "$JSON_FILE"
        fi
        
        # 确定路径类型
        if [ ${#PARTS[@]} -eq 2 ]; then
          PATH_TYPE="full_repo"
        elif [ ${#PARTS[@]} -eq 3 ]; then
          PATH_TYPE="single_subdir"
        else
          PATH_TYPE="multi_subdir"
        fi
        
        # 检查是否已存在相同目标路径的记录
        EXISTS=$(jq --arg target "$TARGET_DIR" 'any(.[]; .target_path == $target)' "$JSON_FILE")
        
        if [ "$EXISTS" = "false" ]; then
          jq --arg target "$TARGET_DIR" \
             --arg local "$DIR_NAME" \
             --arg repo_owner "$REPO_OWNER" \
             --arg repo_name "$REPO_NAME" \
             --arg sub_path "$SUB_PATH" \
             --arg path_type "$PATH_TYPE" \
             --arg date "$(date -Iseconds)" \
             '. += [{
               "target_path": $target, 
               "local_path": $local, 
               "repo_owner": $repo_owner,
               "repo_name": $repo_name,
               "sub_path": $sub_path,
               "path_type": $path_type,
               "pulled_at": $date, 
               "status": "success"
             }]' \
             "$JSON_FILE" > tmp.json && mv tmp.json "$JSON_FILE"
          echo "✅ 添加新记录: $TARGET_DIR"
          echo "   本地路径: $DIR_NAME"
          echo "   仓库: $REPO_OWNER/$REPO_NAME"
          echo "   子路径: '$SUB_PATH'"
          echo "   路径类型: $PATH_TYPE"
        else
          # 更新现有记录
          jq --arg target "$TARGET_DIR" \
             --arg date "$(date -Iseconds)" \
             'map(if .target_path == $target then .pulled_at = $date | .status = "success" else . end)' \
             "$JSON_FILE" > tmp.json && mv tmp.json "$JSON_FILE"
          echo "ℹ️ 更新现有记录: $TARGET_DIR"
        fi
        
    - name: Commit and push changes
      run: |
        git pull origin main --no-rebase
        git add .
        
        if git diff --staged --quiet; then
          echo "没有更改需要提交"
        else
          git commit -m "Auto-pull: ${{ github.event.inputs.target_directory }} [$(date +%Y-%m-%d)]"
          git push origin main
          echo "更改已提交并推送"
        fi
