name: Pull Directory and Update JSON

on:
  workflow_dispatch:
    inputs:
      target_directory:
        description: '目标目录路径 (如: linkease/nas-packages-luci/luci/luci-app-ddnsto)'
        required: true
        default: 'linkease/nas-packages-luci/luci/luci-app-ddnsto'

jobs:
  pull-directory:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout current repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl
        
    - name: Configure Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
    - name: Pull latest changes
      run: |
        git pull origin main
        
    - name: Pull directory using multiple methods
      run: |
        TARGET_DIR="${{ github.event.inputs.target_directory }}"
        DIR_NAME=$(echo "$TARGET_DIR" | awk -F'/' '{print $NF}')
        REPO_OWNER=$(echo "$TARGET_DIR" | cut -d'/' -f1)
        REPO_NAME=$(echo "$TARGET_DIR" | cut -d'/' -f2)
        SUB_PATH=$(echo "$TARGET_DIR" | cut -d'/' -f3-)
        
        echo "Target directory: $TARGET_DIR"
        echo "Directory name: $DIR_NAME"
        echo "Repo: $REPO_OWNER/$REPO_NAME"
        echo "Sub path: '$SUB_PATH'"
        
        # 删除已存在的目录
        if [ -d "$DIR_NAME" ]; then
          echo "Removing existing directory: $DIR_NAME"
          rm -rf "$DIR_NAME"
        fi
        
        # 方法1: 直接克隆整个仓库（当SUB_PATH为空时）
        if [ -z "$SUB_PATH" ]; then
          echo "No sub path provided, cloning entire repository..."
          TEMP_DIR="temp_repo_$$"
          git clone --depth 1 "https://github.com/$REPO_OWNER/$REPO_NAME.git" "$TEMP_DIR"
          mv "$TEMP_DIR" "$DIR_NAME"
          rm -rf "$DIR_NAME/.git"
          echo "✅ Successfully cloned entire repository: $DIR_NAME"
          
        # 方法2: 使用sparse checkout（当有SUB_PATH时）
        else
          echo "Using sparse checkout for sub path..."
          TEMP_DIR="temp_repo_$$"
          mkdir "$TEMP_DIR"
          cd "$TEMP_DIR"
          
          git init
          git remote add origin "https://github.com/$REPO_OWNER/$REPO_NAME.git"
          git config core.sparseCheckout true
          
          echo "$SUB_PATH/*" >> .git/info/sparse-checkout
          
          # 尝试不同的分支
          if git pull origin main 2>/dev/null; then
            echo "Pulled from main branch"
          elif git pull origin master 2>/dev/null; then
            echo "Pulled from master branch"
          else
            echo "Trying default branch..."
            git pull origin HEAD
          fi
          
          cd ..
          
          if [ -d "$TEMP_DIR/$SUB_PATH" ]; then
            mv "$TEMP_DIR/$SUB_PATH" "$DIR_NAME"
            rm -rf "$TEMP_DIR"
            echo "✅ Successfully pulled directory: $DIR_NAME"
          else
            echo "❌ Sparse checkout failed, trying alternative methods..."
            rm -rf "$TEMP_DIR"
            
            # 方法3: 使用GitHub API下载特定目录
            echo "Trying GitHub API method..."
            if command -v python3 >/dev/null 2>&1; then
              python3 << EOF
import os
import requests
import json
import base64

repo_owner = "$REPO_OWNER"
repo_name = "$REPO_NAME"
sub_path = "$SUB_PATH"
dir_name = "$DIR_NAME"

def download_directory(owner, repo, path, local_path):
    # 获取目录内容
    url = f"https://api.github.com/repos/{owner}/{repo}/contents/{path}"
    response = requests.get(url)
    
    if response.status_code != 200:
        print(f"API request failed: {response.status_code}")
        return False
        
    items = response.json()
    
    os.makedirs(local_path, exist_ok=True)
    
    for item in items:
        if item['type'] == 'file':
            # 下载文件
            file_response = requests.get(item['download_url'])
            if file_response.status_code == 200:
                file_path = os.path.join(local_path, item['name'])
                with open(file_path, 'wb') as f:
                    f.write(file_response.content)
                print(f"Downloaded: {item['name']}")
        elif item['type'] == 'dir':
            # 递归下载子目录
            download_directory(owner, repo, f"{path}/{item['name']}", os.path.join(local_path, item['name']))
    
    return True

if download_directory(repo_owner, repo_name, sub_path, dir_name):
    print("✅ Successfully downloaded via GitHub API")
else:
    print("❌ GitHub API method failed")
EOF
            else
              echo "Python3 not available, skipping API method"
            fi
            
            # 检查是否成功创建目录
            if [ -d "$DIR_NAME" ] && [ "$(ls -A "$DIR_NAME")" ]; then
              echo "✅ Directory created successfully"
            else
              echo "❌ All methods failed to pull directory"
              exit 1
            fi
          fi
        fi
        
    - name: Update JSON history
      run: |
        TARGET_DIR="${{ github.event.inputs.target_directory }}"
        DIR_NAME=$(echo "$TARGET_DIR" | awk -F'/' '{print $NF}')
        JSON_FILE="pull_history.json"
        
        if [ ! -f "$JSON_FILE" ]; then
          echo "[]" > "$JSON_FILE"
        fi
        
        if ! jq . "$JSON_FILE" > /dev/null 2>&1; then
          echo "[]" > "$JSON_FILE"
        fi
        
        EXISTS=$(jq --arg target "$TARGET_DIR" 'any(.[]; .target_path == $target)' "$JSON_FILE")
        
        if [ "$EXISTS" = "false" ]; then
          jq --arg target "$TARGET_DIR" \
             --arg local "$DIR_NAME" \
             --arg date "$(date -Iseconds)" \
             '. += [{"target_path": $target, "local_path": $local, "pulled_at": $date, "status": "success"}]' \
             "$JSON_FILE" > tmp.json && mv tmp.json "$JSON_FILE"
          echo "✅ Added new record for: $TARGET_DIR"
        else
          echo "ℹ️ Record already exists for: $TARGET_DIR"
        fi
        
    - name: Commit and push changes
      run: |
        git pull origin main --no-rebase
        git add .
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-pull: ${{ github.event.inputs.target_directory }} [$(date +%Y-%m-%d)]"
          git push origin main
          echo "Changes committed and pushed"
        fi
