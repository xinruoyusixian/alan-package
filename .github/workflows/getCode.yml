name: Pull Directory and Update JSON

on:
  workflow_dispatch:
    inputs:
      target_directory:
        description: '目标目录路径 (如: linkease/nas-packages-luci/luci/luci-app-ddnsto)'
        required: true
        default: 'linkease/nas-packages-luci/luci/luci-app-ddnsto'

jobs:
  pull-directory:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout current repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl python3 python3-pip
        pip3 install requests
        
    - name: Configure Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
    - name: Pull latest changes
      run: |
        git pull origin main
        
    - name: Pull directory using multiple methods
      run: |
        TARGET_DIR="${{ github.event.inputs.target_directory }}"
        DIR_NAME=$(echo "$TARGET_DIR" | awk -F'/' '{print $NF}')
        REPO_OWNER=$(echo "$TARGET_DIR" | cut -d'/' -f1)
        REPO_NAME=$(echo "$TARGET_DIR" | cut -d'/' -f2)
        SUB_PATH=$(echo "$TARGET_DIR" | cut -d'/' -f3-)
        
        echo "Target directory: $TARGET_DIR"
        echo "Directory name: $DIR_NAME"
        echo "Repo: $REPO_OWNER/$REPO_NAME"
        echo "Sub path: '$SUB_PATH'"
        
        # 删除已存在的目录
        if [ -d "$DIR_NAME" ]; then
          echo "Removing existing directory: $DIR_NAME"
          rm -rf "$DIR_NAME"
        fi
        
        # 创建Python脚本来处理目录下载
        cat > download_dir.py << 'EOF'
        import os
        import sys
        import requests
        import json
        from pathlib import Path
        
        def download_directory(owner, repo, path, local_path):
            """使用GitHub API下载目录"""
            url = f"https://api.github.com/repos/{owner}/{repo}/contents/{path}"
            headers = {'Accept': 'application/vnd.github.v3+json'}
            
            try:
                response = requests.get(url, headers=headers)
                if response.status_code != 200:
                    print(f"API请求失败: {response.status_code}")
                    return False
                    
                items = response.json()
                
                # 如果是文件而不是目录
                if isinstance(items, dict) and items.get('type') == 'file':
                    os.makedirs(os.path.dirname(local_path), exist_ok=True)
                    file_response = requests.get(items['download_url'])
                    if file_response.status_code == 200:
                        with open(local_path, 'wb') as f:
                            f.write(file_response.content)
                        print(f"下载文件: {os.path.basename(local_path)}")
                        return True
                    return False
                
                # 处理目录
                os.makedirs(local_path, exist_ok=True)
                downloaded_files = 0
                
                for item in items:
                    if item['type'] == 'file':
                        file_response = requests.get(item['download_url'])
                        if file_response.status_code == 200:
                            file_path = os.path.join(local_path, item['name'])
                            with open(file_path, 'wb') as f:
                                f.write(file_response.content)
                            print(f"下载文件: {item['name']}")
                            downloaded_files += 1
                    elif item['type'] == 'dir':
                        # 递归下载子目录
                        sub_dir_path = os.path.join(local_path, item['name'])
                        if download_directory(owner, repo, f"{path}/{item['name']}", sub_dir_path):
                            downloaded_files += 1
                
                return downloaded_files > 0
                
            except Exception as e:
                print(f"下载过程中出错: {str(e)}")
                return False
        
        if __name__ == "__main__":
            if len(sys.argv) != 5:
                print("用法: python3 download_dir.py <owner> <repo> <path> <local_path>")
                sys.exit(1)
                
            owner, repo, path, local_path = sys.argv[1:]
            success = download_directory(owner, repo, path, local_path)
            sys.exit(0 if success else 1)
        EOF
        
        # 方法1: 使用GitHub API下载
        echo "尝试使用GitHub API下载..."
        if python3 download_dir.py "$REPO_OWNER" "$REPO_NAME" "$SUB_PATH" "$DIR_NAME"; then
          echo "✅ 通过GitHub API成功下载目录: $DIR_NAME"
        else
          echo "❌ GitHub API方法失败，尝试备用方法..."
          
          # 方法2: 使用git sparse checkout
          echo "尝试使用git sparse checkout..."
          TEMP_DIR="temp_repo_$$"
          mkdir "$TEMP_DIR"
          cd "$TEMP_DIR"
          
          git init
          git remote add origin "https://github.com/$REPO_OWNER/$REPO_NAME.git"
          git config core.sparseCheckout true
          
          # 设置sparse checkout路径
          if [ -n "$SUB_PATH" ]; then
            echo "$SUB_PATH/*" > .git/info/sparse-checkout
          else
            echo "/*" > .git/info/sparse-checkout
          fi
          
          # 尝试不同的分支
          BRANCHES=("main" "master" "HEAD")
          for branch in "${BRANCHES[@]}"; do
            if git pull origin "$branch" --depth=1 2>/dev/null; then
              echo "从 $branch 分支拉取成功"
              break
            fi
          done
          
          cd ..
          
          # 移动文件到目标位置
          if [ -n "$SUB_PATH" ] && [ -d "$TEMP_DIR/$SUB_PATH" ]; then
            mv "$TEMP_DIR/$SUB_PATH" "$DIR_NAME"
            echo "✅ 通过sparse checkout成功下载目录: $DIR_NAME"
          elif [ -d "$TEMP_DIR" ] && [ "$(ls -A "$TEMP_DIR")" ]; then
            mv "$TEMP_DIR" "$DIR_NAME"
            echo "✅ 成功克隆整个仓库: $DIR_NAME"
          else
            echo "❌ 所有方法都失败了"
            rm -rf "$TEMP_DIR"
            exit 1
          fi
          
          rm -rf "$TEMP_DIR"
        fi
        
        # 清理临时文件
        rm -f download_dir.py
        
    - name: Update JSON history
      run: |
        TARGET_DIR="${{ github.event.inputs.target_directory }}"
        DIR_NAME=$(echo "$TARGET_DIR" | awk -F'/' '{print $NF}')
        JSON_FILE="pull_history.json"
        
        if [ ! -f "$JSON_FILE" ]; then
          echo "[]" > "$JSON_FILE"
        fi
        
        if ! jq . "$JSON_FILE" > /dev/null 2>&1; then
          echo "[]" > "$JSON_FILE"
        fi
        
        EXISTS=$(jq --arg target "$TARGET_DIR" 'any(.[]; .target_path == $target)' "$JSON_FILE")
        
        if [ "$EXISTS" = "false" ]; then
          jq --arg target "$TARGET_DIR" \
             --arg local "$DIR_NAME" \
             --arg date "$(date -Iseconds)" \
             '. += [{"target_path": $target, "local_path": $local, "pulled_at": $date, "status": "success"}]' \
             "$JSON_FILE" > tmp.json && mv tmp.json "$JSON_FILE"
          echo "✅ 添加新记录: $TARGET_DIR"
        else
          echo "ℹ️ 记录已存在: $TARGET_DIR"
        fi
        
    - name: Commit and push changes
      run: |
        git pull origin main --no-rebase
        git add .
        
        if git diff --staged --quiet; then
          echo "没有更改需要提交"
        else
          git commit -m "Auto-pull: ${{ github.event.inputs.target_directory }} [$(date +%Y-%m-%d)]"
          git push origin main
          echo "更改已提交并推送"
        fi
